syntax = "proto3";
import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

package profile;

// This is the Go package name
option go_package = "profilepb/";

message Profile {
  string id = 1;
  string account_id = 2;
  string username = 3;
  string avatar_url = 4;
  string gender = 5;
  string birth_day = 6;
  string mood = 7;
  repeated string badges = 8;
  bool is_subscription = 9;
  bool is_adult = 10;
  bool is_show_subscription_badge = 11;
  string country = 12;
  bool is_ambassador = 13;
  repeated LocalDistrict local_districts = 14;
  bool is_unlock_private_map = 15;
  bool is_bot = 16;
  bool is_show_toast_msg_send_emoji = 17;
  google.protobuf.Timestamp created_at = 18;
  bool is_complete = 19;
  string reason_of_using = 20;

  // Phase 2 — about-me metadata (D-10) + main photo (D-11). About-me enums use
  // plain string (empty = unset), validated against the D-12 taxonomy in the
  // service. main_photo_url is DERIVED from profile_photos[0] and is populated
  // by the service on read (not stored as a column).
  string bio = 21;
  string vibe = 22;                            // default "Just Saying Hi!" — cannot be deselected (D-10)
  RepeatedStringValue languages = 23;          // ≤3 (D-12)
  RepeatedStringValue interests = 24;          // ≤10 (D-12)
  string looking_for = 25;
  string zodiac = 26;
  string education = 27;
  string family_plans = 28;
  string communication_style = 29;
  string pets = 30;
  string drinking = 31;
  string smoking = 32;
  string workout = 33;
  string main_photo_url = 34;                  // derived from photo[0] (populated by the service)
}

service ProfileService {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Get(GetRequest) returns (Profile);
  rpc GetByAccount(GetByAccountRequest) returns (Profile);
  rpc GetByUsername(GetByUsernameRequest) returns (Profile);
  rpc ListByAccounts(ListByAccountsRequest) returns (ListByAccountsResponse);
  rpc Update(UpdateRequest) returns (Profile);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc CheckUsername(CheckUsernameRequest) returns (CheckUsernameResponse);
  rpc GetListExcludedAccountID(GetListExcludedAccountIDRequest) returns (GetListExcludedAccountIDResponse);
  rpc SearchByUsername(SearchByUsernameRequest) returns (SearchByUsernameResponse);
  rpc GetProfilesByAccountID(GetProfilesByAccountIDRequest) returns (GetProfilesByAccountIDResponse);

  // Additional methods for profile views
  rpc RecordProfileView(RecordProfileViewReq) returns (google.protobuf.Empty);
  rpc GetProfileViewers(GetProfileViewersReq) returns (GetProfileViewersRes);
  rpc GetProfileViewersToday(GetProfileViewersTodayReq) returns (GetProfileViewersRes);

  // Emoji transaction methods
  rpc SendEmoji(SendEmojiRequest) returns (SendEmojiResponse);
  rpc GetReceivedEmojis(GetReceivedEmojisRequest) returns (GetReceivedEmojisResponse);
  rpc CountUnclaimedEmojis(CountUnclaimedEmojisRequest) returns (CountUnclaimedEmojisResponse);
  
  // Subscription management methods
  rpc GetUsersWithActiveSubscription(GetUsersWithActiveSubscriptionRequest) returns (GetUsersWithActiveSubscriptionResponse);

  // Referral management methods
  rpc SaveReferralClick(SaveReferralClickRequest) returns (SaveReferralClickResponse);
  rpc ValidateReferralMatch(ValidateReferralMatchRequest) returns (ValidateReferralMatchResponse);
  rpc FindReferralMatch(FindReferralMatchRequest) returns (FindReferralMatchResponse);
  // Campaign referral endpoints (Phase 1: campaign share-type click + validate)
  rpc SaveCampaignClick(SaveCampaignClickRequest) returns (SaveCampaignClickResponse);
  rpc ValidateCampaignMatch(ValidateCampaignMatchRequest) returns (ValidateCampaignMatchResponse);
  rpc GetReferralStats(GetReferralStatsRequest) returns (GetReferralStatsResponse);
  rpc GetUserReferrals(GetUserReferralsRequest) returns (GetUserReferralsResponse);
  // Get all referrals in the system (public version with limited access)
  rpc GetAllReferrals(GetAllReferralsRequest) returns (GetAllReferralsResponse);

  // Referral banner methods
  rpc GetReferrerByReferredAccount(GetReferrerByReferredAccountRequest) returns (GetReferrerByReferredAccountResponse);
  rpc GetUnseenReferrals(GetUnseenReferralsRequest) returns (GetUnseenReferralsResponse);
  rpc MarkReferralBannersShown(MarkReferralBannersShownRequest) returns (MarkReferralBannersShownResponse);
  rpc MarkReferredBannerShown(MarkReferredBannerShownRequest) returns (MarkReferredBannerShownResponse);

  // Event management methods
  // Admin event management
  rpc CreateReferralEvent(CreateEventRequest) returns (ReferralEvent);
  rpc UpdateReferralEvent(UpdateEventRequest) returns (ReferralEvent);
  rpc ToggleEventStatus(ToggleEventStatusRequest) returns (ReferralEvent);
  rpc GetEventByID(GetEventByIDRequest) returns (ReferralEvent);
  rpc GetAllEvents(GetAllEventsRequest) returns (GetAllEventsResponse);

  // Public/User event methods
  rpc GetActiveEvent(GetActiveEventRequest) returns (GetActiveEventResponse);
  rpc GetMyEventWallet(GetMyWalletRequest) returns (GetMyWalletResponse);
  rpc GetProfileByAccountIDs(GetProfileByAccountIDsRequest) returns (GetProfileByAccountIDsResponse);
  rpc UpdateProfileLocalDistrict(UpdateProfileLocalDistrictRequest) returns (UpdateProfileLocalDistrictResponse);
  rpc UnlockPrivateMap(UnlockPrivateMapRequest) returns (UnlockPrivateMapResponse);
  rpc GetBots(GetBotsRequest) returns (GetBotsResponse);

  // Engagement streak methods
  rpc RecordEngagement(RecordEngagementRequest) returns (RecordEngagementResponse);
  rpc GetEngagementStreak(GetEngagementStreakRequest) returns (GetEngagementStreakResponse);
  rpc ListEngagementLogs(ListEngagementLogsRequest) returns (ListEngagementLogsResponse);

  // Phase 2 — multi-photo avatar (D-11) + view-count counter (D-13).
  rpc ListProfilePhotos(ListProfilePhotosRequest) returns (ListProfilePhotosResponse);
  rpc UploadProfilePhoto(UploadProfilePhotoRequest) returns (ProfilePhoto);
  rpc DeleteProfilePhoto(DeleteProfilePhotoRequest) returns (DeleteProfilePhotoResponse);
  rpc ReorderProfilePhotos(ReorderProfilePhotosRequest) returns (ReorderProfilePhotosResponse);
  rpc SetMainProfilePhoto(SetMainProfilePhotoRequest) returns (ProfilePhoto);
  rpc GetProfileViewCount(GetProfileViewCountRequest) returns (GetProfileViewCountResponse);

  // Phase 2 — about-me taxonomy (D-12). Authoritative allowlist of valid values
  // for each about-me field, consumed by the BFF/FE to render pickers + validate
  // before PATCH /profile/me. DB-free (sourced from the in-service taxonomy map).
  rpc GetAboutMeTaxonomy(GetAboutMeTaxonomyRequest) returns (GetAboutMeTaxonomyResponse);
}

message UpdateProfileLocalDistrictRequest {
  string account_id = 1;
  int64 district_id = 2;
  int64 province_id = 3;
  int64 country_id = 4;
}
message UpdateProfileLocalDistrictResponse {
  bool success = 1;
}

// Admin service for user management
service AdminService {
  // Get all users with pagination and filters
  rpc GetAllUsers(GetAllUsersRequest) returns (GetAllUsersResponse);
  // Get detailed information about a specific user
  rpc GetUserDetail(GetUserDetailRequest) returns (GetUserDetailResponse);
  // Get referral information for a specific user
  rpc GetUserReferrals(GetUserReferralsAdminRequest) returns (GetUserReferralsAdminResponse);
  // Update user profile by admin
  rpc UpdateUser(UpdateUserAdminRequest) returns (UpdateUserAdminResponse);
  // Get all referrals in the system with filters
  rpc GetAllReferrals(GetAllReferralsRequest) returns (GetAllReferralsAdminResponse);
  // Get list of available countries in the system
  rpc GetAvailableCountries(google.protobuf.Empty) returns (GetAvailableCountriesResponse);
  // Get user registration statistics by date
  rpc GetUserRegistrationStats(GetUserRegistrationStatsRequest) returns (GetUserRegistrationStatsResponse);
  // Get campaign performance statistics (clicks + install success) by date
  rpc GetCampaignPerformanceStats(GetCampaignPerformanceStatsRequest) returns (GetCampaignPerformanceStatsResponse);
  // Get referral performance statistics (clicks + completed) by date
  rpc GetReferralPerformance(GetReferralPerformanceRequest) returns (GetReferralPerformanceResponse);
  // Create a new user
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
}

message GetAllUsersRequest {
  int32 page = 1;
  int32 limit = 2;
  string search_username = 3;
  string search_phone = 4;
  bool isSubscription = 5;
  bool filter_adult = 6;
  string sort_by = 7; // created_at, updated_at, username
  string sort_order = 8; // asc, desc
  string start_date = 9; // ISO format date string YYYY-MM-DD
  string end_date = 10; // ISO format date string YYYY-MM-DD
  string gender = 11; // male, female, other
  repeated string search_countries = 12; // Country codes filter (e.g., ["VN", "US", "KO"])
}

message GetAllUsersResponse {
  repeated UserInfo users = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
  int32 total_pages = 5;
}

message UserInfo {
  string id = 1;
  string account_id = 2;
  string username = 3;
  string avatar_url = 4;
  string gender = 5;
  string birth_day = 6;
  string mood = 7;
  repeated string badges = 8;
  bool is_subscription = 9;
  bool is_adult = 10;
  bool is_show_subscription_badge = 11;
  string created_at = 12;
  string updated_at = 13;
  bool is_active = 14;
  string subscription_status = 15;
  string subscription_plan = 16;
  string subscription_end_date = 17;
  ReferralInfo referral = 18;
  string country = 19;
}

message ProfileWithAccount {
  string id = 1;
  string account_id = 2;
  string username = 3;
  string avatar_url = 4;
  string gender = 5;
  string birth_day = 6;
  string mood = 7;
  repeated string badges = 8;
  bool is_subscription = 9;
  bool is_adult = 10;
  bool is_show_subscription_badge = 11;
  string created_at = 12;
  string updated_at = 13;
  bool is_active = 14;
  string subscription_status = 15;
  string subscription_plan = 16;
  string subscription_end_date = 17;
  string country = 18;
}

message ReferralInfo {
  string referrer_account_id = 1;
  string referrer_username = 2;
  string referrer_avatar_url = 3;
  string referred_at = 4;
  string status = 5;
  double match_score = 6;
  int32 total_referrals = 7;
  int32 successful_referrals = 8;
  int32 pending_referrals = 9;
}

message CreateRequest {
  string account_id = 1;
  string username = 2;
  string avatar_url = 3;
  string gender = 4;
  string birth_day = 5;
  string mood = 6;
  bool is_adult = 7;
  string ref_account_id = 8; // Referral account ID
  string country = 9;
  bool is_direct_ref_code = 10; // Direct referral code flag
}

message CreateResponse {
  Profile profile = 1;
}

message GetRequest {
  string id = 1;
}

message GetByAccountRequest {
  string account_id = 1;
}

message GetByUsernameRequest {
  string username = 1;
}

message ListByAccountsRequest {
  repeated string account_ids = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListByAccountsResponse {
  repeated Profile profiles = 1;
}

message UpdateRequest {
  string id = 1;
  string username = 2;
  string avatar_url = 3;
  string gender = 4;
  string birth_day = 5;
  string mood = 6;
  RepeatedStringValue badges = 7;
  google.protobuf.BoolValue is_subscription = 8;
  google.protobuf.BoolValue is_adult = 9;
  google.protobuf.BoolValue is_show_subscription_badge = 10;
  string country = 11;
  google.protobuf.BoolValue is_ambassador = 12;
  repeated LocalDistrict local_districts = 13;
  google.protobuf.BoolValue is_show_toast_msg_send_emoji = 14;
  google.protobuf.BoolValue is_complete = 15;
  string reason_of_using = 16;

  // Phase 2 — about-me (D-10). Scalars use plain string (empty = "no update";
  // vibe is non-clearable per D-10/Pitfall 6 — the service ignores empty vibe).
  // Arrays use RepeatedStringValue (nil = omit; non-nil = replace).
  // Validation against the D-12 taxonomy happens in the profile service.
  string bio = 17;
  string vibe = 18;
  RepeatedStringValue languages = 19;
  RepeatedStringValue interests = 20;
  google.protobuf.StringValue looking_for = 21;
  google.protobuf.StringValue zodiac = 22;
  google.protobuf.StringValue education = 23;
  google.protobuf.StringValue family_plans = 24;
  google.protobuf.StringValue communication_style = 25;
  google.protobuf.StringValue pets = 26;
  google.protobuf.StringValue drinking = 27;
  google.protobuf.StringValue smoking = 28;
  google.protobuf.StringValue workout = 29;
}

message UpdateResponse {
  Profile profile = 1;
}

message DeleteRequest {
  string account_id = 1;
}

message DeleteResponse {
  bool success = 1;
}

message CheckUsernameRequest {
  string username = 1;
}

message CheckUsernameResponse {
  bool exists = 1;
}

message GetListExcludedAccountIDRequest {
  string account_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message GetListExcludedAccountIDResponse {
  repeated Profile profiles = 1;
}

message SearchByUsernameRequest {
  string username = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message SearchByUsernameResponse {
  repeated Profile profiles = 1;
}

message GetProfilesByAccountIDRequest {
  repeated string account_ids = 1;
}

message GetProfilesByAccountIDResponse {
  repeated Profile profiles = 1;
}

message RepeatedStringValue {
  repeated string values = 1;
}

message RecordProfileViewReq {
  string viewer_account_id = 1;
  string account_id = 2;  
}
message GetProfileViewersReq {
  string account_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}
message GetProfileViewersRes {
  repeated Profile viewers = 1;
}
message GetProfileViewersTodayReq {
  string account_id = 1;
}

// Emoji transaction messages
message SendEmojiRequest {
  string sender_id = 1;
  string recipient_id = 2;
  string emoji_path = 3;
  int32 quantity = 4;
}

message SendEmojiResponse {
  string transaction_id = 1;
  bool success = 2;
  string message = 3;
}

message GetReceivedEmojisRequest {
  string recipient_id = 1;
  int32 limit = 2;
}

message EmojiTransaction {
  string transaction_id = 1;
  Profile sender = 2;
  string emoji_url = 3;
  string emoji_path = 4;
  int32 quantity = 5;
  string sent_at = 6;
}

message GetReceivedEmojisResponse {
  repeated EmojiTransaction emojis = 1;
  int32 total = 2;
}

message CountUnclaimedEmojisRequest {
  string recipient_id = 1;
}

message CountUnclaimedEmojisResponse {
  int32 count = 1;
}

// Subscription management messages
message GetUsersWithActiveSubscriptionRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message GetUsersWithActiveSubscriptionResponse {
  repeated Profile profiles = 1;
  int32 total = 2;
  int32 limit = 3;
  int32 offset = 4;
}

// Referral management messages
message SaveReferralClickRequest {
  string ref_code = 1;
  string click_timestamp = 2;
  string ip_address = 3;
  string user_agent = 4;
  string language = 5;
  string timezone = 6;
  ScreenInfo screen = 7;
}

message SaveReferralClickResponse {
  bool success = 1;
  string tracking_id = 2;
}

message ValidateReferralMatchRequest {
  string ref_code = 1;
  string install_timestamp = 2;
  string ip_address = 3;
  string os = 4;
  string os_version = 5;
  string device = 6;
  string bundle_id = 7;
  string idfv = 8;
  string language = 9;
  string timezone = 10;
  ScreenInfo screen = 11;
}

message ValidateReferralMatchResponse {
  bool is_match = 1;
  float match_score = 2;
  string referrer_account_id = 3;
  string breakdown = 4;
}

message FindReferralMatchRequest {
  string install_timestamp = 1;
  string ip_address = 2;
  string os = 3;
  string os_version = 4;
  string device = 5;
  string bundle_id = 6;
  string idfv = 7;
  string language = 8;
  string timezone = 9;
  ScreenInfo screen = 10;
}

message FindReferralMatchResponse {
  bool is_match = 1;
  float match_score = 2;
  string ref_code = 3;
  string referrer_account_id = 4;
  string breakdown = 5;
}

// Campaign referral messages (Phase 1). Dedicated types per D-02 — do NOT reuse the
// profile-referral types. ValidateCampaignMatchRequest field set is a verified
// superset of ValidateReferralMatchRequest (same fields, same numbers 1-11).
message SaveCampaignClickRequest {
  string ref_code = 1;
  string click_timestamp = 2;
  string ip_address = 3;
  string user_agent = 4;
  string language = 5;
  string timezone = 6;
  ScreenInfo screen = 7;
}

message SaveCampaignClickResponse {
  bool success = 1;
  string tracking_id = 2;
}

message ValidateCampaignMatchRequest {
  string ref_code = 1;
  string install_timestamp = 2;
  string ip_address = 3;
  string os = 4;
  string os_version = 5;
  string device = 6;
  string bundle_id = 7;
  string idfv = 8;
  string language = 9;
  string timezone = 10;
  ScreenInfo screen = 11;
}

message ValidateCampaignMatchResponse {
  bool is_match = 1;
  float match_score = 2;
  string referrer_account_id = 3;
  string matched_code = 4;
  string breakdown = 5;
  google.protobuf.Struct metadata = 6;
}

message GetReferralStatsRequest {
  string account_id = 1;
}

message GetReferralStatsResponse {
  int32 total_referrals = 1;
  int32 successful_referrals = 2;
  int32 pending_referrals = 3;
  repeated ReferralBreakdown monthly_stats = 4;
}

message GetUserReferralsRequest {
  string account_id = 1;
  int32 limit = 2;
  int32 offset = 3;
  string status = 4;
}

message GetUserReferralsResponse {
  repeated ReferredUser users = 1;
  int32 total = 2;
}

message ScreenInfo {
  int32 width = 1;
  int32 height = 2;
  float dpr = 3;
}

message ReferralBreakdown {
  string month = 1;
  int32 count = 2;
}

message ReferredUser {
  string account_id = 1;
  string username = 2;
  string avatar_url = 3;
  string status = 4;
  google.protobuf.Timestamp referred_at = 5;
  float match_score = 6;
  string referral_id = 7;
}

// Referral banner messages
message GetReferrerByReferredAccountRequest {
  string account_id = 1;
}

message GetReferrerByReferredAccountResponse {
  ReferredUserReferrer referrer = 1;
  bool banner_shown = 2;
}

message ReferredUserReferrer {
  string account_id = 1;
  string username = 2;
  string avatar_url = 3;
}

message GetUnseenReferralsRequest {
  string account_id = 1;
}

message GetUnseenReferralsResponse {
  repeated ReferredUser users = 1;
  int32 total = 2;
}

message MarkReferralBannersShownRequest {
  string account_id = 1;
  repeated string account_ids = 2;
}

message MarkReferralBannersShownResponse {
  bool success = 1;
}

message MarkReferredBannerShownRequest {
  string account_id = 1;
}

message MarkReferredBannerShownResponse {
  bool success = 1;
}

// Admin API messages
message GetUserDetailRequest {
  string account_id = 1;
}

message GetUserDetailResponse {
  UserDetail user = 1;
}

message UserDetail {
  string id = 1;
  string account_id = 2;
  string username = 3;
  string avatar_url = 4;
  string gender = 5;
  string birth_day = 6;
  string mood = 7;
  repeated string badges = 8;
  bool is_subscription = 9;
  bool is_adult = 10;
  bool is_show_subscription_badge = 11;
  string created_at = 12;
  string updated_at = 13;
  bool is_active = 14;
  string subscription_status = 15;
  string subscription_plan = 16;
  string subscription_end_date = 17;
  ReferrerInfo referred_by = 18;
  ReferralStats referral_stats = 19;
  string country = 20;
}

message ReferrerInfo {
  string referrer_account_id = 1;
  string referrer_username = 2;
  string referrer_avatar_url = 3;
  string referred_at = 4;
  string status = 5;
  double match_score = 6;
}

message ReferralStats {
  int32 total_referrals = 1;
  int32 successful_referrals = 2;
  int32 pending_referrals = 3;
  repeated MonthlyReferralStat monthly_stats = 4;
}

message MonthlyReferralStat {
  string month = 1;
  int32 count = 2;
}

message GetUserReferralsAdminRequest {
  string account_id = 1;
  int32 page = 2;
  int32 limit = 3;
  string status = 4;
  optional bool is_direct = 5;
}

message GetUserReferralsAdminResponse {
  repeated UserInfo users = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
  int32 total_pages = 5;
}


message ReferredUserDetail {
  string account_id = 1;
  string username = 2;
  string avatar_url = 3;
  string status = 4;
  string referred_at = 5;
  double match_score = 6;
}

message PaginationInfo {
  int32 page = 1;
  int32 limit = 2;
  int32 total = 3;
  int32 total_pages = 4;
}

// Admin update user messages
message UpdateUserAdminRequest {
  string account_id = 1;
  google.protobuf.StringValue username = 2;
  google.protobuf.StringValue avatar_url = 3;
  google.protobuf.StringValue gender = 4;
  google.protobuf.StringValue birth_day = 5;
  google.protobuf.StringValue mood = 6;
  RepeatedStringValue badges = 7;
  google.protobuf.BoolValue is_subscription = 8;
  google.protobuf.BoolValue is_adult = 9;
  google.protobuf.BoolValue is_show_subscription_badge = 10;
}

message UpdateUserAdminResponse {
  UserDetail user = 1;
}

// Admin get all referrals messages
message GetAllReferralsRequest {
  int32 page = 1;
  int32 limit = 2;
  string status = 3; // pending, matched, completed, expired
  string start_date = 4; // YYYY-MM-DD
  string end_date = 5; // YYYY-MM-DD
  string sort_by = 6; // created_at, referred_at, match_score
  string sort_order = 7; // asc, desc
  string search_referrer = 8; // search by referrer username
  string search_referred = 9; // search by referred username
  repeated string search_user_ids = 10; // search by multiple user account IDs
  string gender = 11; // filter by gender (male, female, etc.)
  string country = 12; // filter by country code
  optional bool is_direct = 13; // filter by direct referral or not direct referral
}

message GetAllReferralsResponse {
  repeated ReferralLeaderboardEntry leaderboard = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
  int32 total_pages = 5;
}

message GetAllReferralsAdminResponse {
  repeated ReferralDetail referrals = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
  int32 total_pages = 5;
}

message ReferralLeaderboardEntry {
  int32 rank = 1;
  UserInfo referrer = 2;  // Changed from ReferrerInfo to UserInfo to match admin/users structure
  int32 total_referrals = 3;
  int32 successful_referrals = 4;
}

message ReferralDetail {
  string id = 1;
  ReferrerInfo referrer = 2;
  ReferredUserDetail referred_user = 3;
  string status = 4;
  double match_score = 5;
  string created_at = 6;
  string referred_at = 7;
}

message GetAvailableCountriesResponse {
  repeated string countries = 1; // List of country codes: ["VN", "US", "JP", ...]
}

// User registration statistics messages
message GetUserRegistrationStatsRequest {
  string start_date = 1; // YYYY-MM-DD format
  string end_date = 2;   // YYYY-MM-DD format
}

message GetUserRegistrationStatsResponse {
  repeated UserRegistrationStat stats = 1;
}

message UserRegistrationStat {
  string date = 1;  // DD/MM/YYYY format
  int32 count = 2;  // Number of users registered on this date
}

// Campaign performance statistics messages (clicks + install success by date)
message GetCampaignPerformanceStatsRequest {
  string start_date = 1; // YYYY-MM-DD format
  string end_date = 2;   // YYYY-MM-DD format
}

message GetCampaignPerformanceStatsResponse {
  repeated CampaignPerformanceStat stats = 1;
}

message CampaignPerformanceStat {
  string date = 1;    // DD/MM/YYYY format
  int32 clicks = 2;   // Total campaign clicks on this date
  int32 installs = 3; // Total install successes (matched) on this date
}

// Referral performance statistics messages (clicks + completed by date)
message GetReferralPerformanceRequest {
  string start_date = 1; // YYYY-MM-DD format
  string end_date = 2;   // YYYY-MM-DD format
}

message GetReferralPerformanceResponse {
  repeated ReferralPerformanceStat stats = 1;
}

message ReferralPerformanceStat {
  string date = 1;     // DD/MM/YYYY format
  int32 clicks = 2;    // Total referral clicks on this date
  int32 completed = 3; // Total completed referrals on this date
}

// ========== EVENT MANAGEMENT ==========

message ReferralEvent {
  string id = 1;
  string event_code = 2;
  string event_name = 3;
  string description = 4;
  string start_date = 5;
  string end_date = 6;
  bool is_active = 7;
}

message RewardTier {
  int32 min = 1;
  int32 max = 2;
  double amount = 3;
  string badge = 4;
}

message UserEventWallet {
  string id = 1;
  string account_id = 2;
  string event_id = 3;
  string user_signup_date = 4;
  string event_window_end = 5;
  int32 valid_referrals = 6;
  double available_balance = 7;
  double withdrawn_balance = 8;
  bool has_ambassador_badge = 9;
}

message CreateEventRequest {
  string event_code = 1;
  string event_name = 2;
